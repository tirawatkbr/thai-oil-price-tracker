name: 🛢️ Daily Oil Price Update

on:
  schedule:
    - cron: "5 23 * * *"   # 06:05 AM Thailand time (UTC+7 → 23:05 UTC)
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update even if today's data already exists"
        required: false
        default: "false"
        type: boolean

jobs:
  scrape-and-deploy:
    name: Scrape Oil Prices
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright Chromium (for Shell)
        run: playwright install chromium --with-deps
        continue-on-error: true   # Shell is optional — other sources still run

      - name: 🔍 Scrape oil prices
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
        run: python scripts/scraper.py

      - name: 💾 Commit price data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add prices.json price_history.json
          git diff --staged --quiet || \
            git commit -m "🛢️ ราคาน้ำมัน $(TZ='Asia/Bangkok' date +'%Y-%m-%d %H:%M') [bot]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Job summary
        run: |
          {
            echo "### 🛢️ อัปเดตราคาน้ำมันสำเร็จ"
            echo ""
            echo "| รายการ | ค่า |"
            echo "| --- | --- |"
            echo "| 📅 วันที่ | $(TZ='Asia/Bangkok' date +'%Y-%m-%d') |"
            echo "| ⏰ เวลา   | $(TZ='Asia/Bangkok' date +'%H:%M น.') |"
            if [ -f prices.json ]; then
              echo "| 📦 prices.json | $(wc -c < prices.json | tr -d ' ') bytes |"
              BRANDS=$(python3 -c "import json; d=json.load(open('prices.json')); print(', '.join(d['brands']))" 2>/dev/null || echo "?")
              echo "| 🏪 แบรนด์ | ${BRANDS} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🚨 Failure summary
        if: failure()
        run: |
          echo "### ❌ Scraper ล้มเหลว — ตรวจสอบ logs ด้านบน" >> "$GITHUB_STEP_SUMMARY"
